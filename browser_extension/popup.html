<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 350px;
      font-family: Arial, sans-serif;
      padding: 15px;
      background: #f5f5f5;
    }
    h2 { margin-top: 0; color: #333; }

    .status {
      padding: 10px;
      border-radius: 5px;
      margin: 10px 0;
      text-align: center;
      font-weight: bold;
    }
    .status.stopped { background: #eee; color: #666; }
    .status.connecting { background: #fff3e0; color: #ef6c00; }
    .status.recording { background: #ffebee; color: #c62828; }
    .status.ready { background: #e8f5e9; color: #2e7d32; }

    button {
      width: 100%;
      padding: 12px;
      margin: 5px 0;
      font-size: 14px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .btn-start { background: #4caf50; color: white; }
    .btn-start:hover { background: #388e3c; }
    .btn-stop { background: #f44336; color: white; }
    .btn-stop:hover { background: #d32f2f; }
    button:disabled { background: #ccc; cursor: not-allowed; }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 5px;
    }

    #output {
      width: 100%;
      height: 200px;
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      overflow-y: auto;
      background: white;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .segment {
      padding: 5px;
      border-bottom: 1px solid #eee;
    }
    .segment:last-child { border-bottom: none; }
    .time { color: #999; font-size: 11px; }
    .text { color: #333; }

    .copy-btn {
      background: #2196f3;
      color: white;
    }
    .clear-btn {
      background: #ff9800;
      color: white;
    }
  </style>
</head>
<body>
  <h2>🎙️ 视频转文字</h2>

  <div id="status" class="status stopped">未连接</div>

  <input type="text" id="serverUrl" placeholder="服务器地址 ws://IP:8000" value="">

  <button id="startBtn" class="btn-start">开始录制</button>
  <button id="stopBtn" class="btn-stop" disabled>停止</button>

  <div id="output"></div>

  <button id="copyBtn" class="copy-btn">复制文字</button>
  <button id="clearBtn" class="clear-btn">清空</button>

  <script src="popup.js"></script>
</body>
</html>
